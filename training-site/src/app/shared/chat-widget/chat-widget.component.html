<!-- ═══ Floating Action Button ═══ -->
<button class="chat-fab" [class.open]="chat.isOpen()" (click)="chat.toggle()" aria-label="Toggle chat">
	<span class="fab-glow"></span>
	<span class="fab-ripple"></span>
	<span class="fab-badge" *ngIf="!chat.isOpen()">1</span>
	<span class="fab-icon icon-chat">
		<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
			stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
			<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
		</svg>
	</span>
	<span class="fab-icon icon-close">
		<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
			stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
			<line x1="18" y1="6" x2="6" y2="18" />
			<line x1="6" y1="6" x2="18" y2="18" />
		</svg>
	</span>
</button>

<!-- ═══ Chat Panel ═══ -->
<div class="chat-panel" [class.open]="chat.isOpen()">

	<!-- ─── Gradient Header with Hero ─── -->
	<div class="chat-header">
		<div class="header-bg">
			<div class="header-orb header-orb--1"></div>
			<div class="header-orb header-orb--2"></div>
		</div>
		<div class="header-content">
			<div class="header-top">
				<div class="header-brand">
					<div class="brand-avatar">
						<div class="avatar-ring"></div>
						<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<path d="M12 8V4H8" />
							<rect width="16" height="12" x="4" y="8" rx="2" />
							<path d="M2 14h2" /><path d="M20 14h2" />
							<path d="M15 13v2" /><path d="M9 13v2" />
						</svg>
					</div>
					<div class="brand-info">
						<span class="brand-name">Dev2080 AI</span>
						<span class="brand-status" [class.ai-on]="chat.aiStatus() === 'connected'">
							<span class="status-indicator"></span>
							{{ chat.aiStatus() === 'connected' ? 'AI Powered' : 'Online' }}
						</span>
					</div>
				</div>
				<button class="header-close" (click)="chat.close()" aria-label="Close chat">
					<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
						<polyline points="6 9 12 15 18 9" />
					</svg>
				</button>
			</div>
			<!-- Welcome hero (shown only initially) -->
			<div *ngIf="chat.messages().length <= 1" class="header-hero">
				<h5 class="hero-title">Hi there! 👋</h5>
				<p class="hero-subtitle">Ask us anything about courses, coaching, or getting started in tech.</p>
			</div>
		</div>
	</div>

	<!-- ─── Messages Container ─── -->
	<div class="chat-body" #messagesContainer>

		<!-- Welcome Card (initial state) -->
		<div *ngIf="chat.messages().length <= 1" class="welcome-card">
			<!-- API Key Setup -->
			<div *ngIf="!chat.isAIConfigured()" class="ai-upgrade-card">
				<div class="upgrade-row">
					<div class="upgrade-icon">
						<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
						</svg>
					</div>
					<span class="upgrade-text">Unlock AI mode with a <a href="https://aistudio.google.com/apikey"
							target="_blank" rel="noopener">Gemini key</a></span>
					<button class="upgrade-toggle" (click)="showApiKeyInput = !showApiKeyInput">
						{{ showApiKeyInput ? 'Cancel' : 'Setup' }}
					</button>
				</div>
				<div *ngIf="showApiKeyInput" class="upgrade-input">
					<input type="password" [(ngModel)]="apiKeyInput" placeholder="Paste API key..."
						autocomplete="off" (keydown.enter)="setApiKey()" />
					<button (click)="setApiKey()" [disabled]="!apiKeyInput.trim()">
						<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
							fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
							stroke-linejoin="round">
							<polyline points="20 6 9 17 4 12" />
						</svg>
					</button>
				</div>
			</div>

			<!-- Quick Actions Grid -->
			<div class="quick-actions">
				<button *ngFor="let qr of chat.quickReplies; let i = index" class="action-card"
					[style.animation-delay]="(i * 60) + 'ms'" (click)="sendQuickReply(qr.value)">
					<span class="action-icon">
						<ng-container [ngSwitch]="qr.label">
							<svg *ngSwitchCase="'Courses'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
							<svg *ngSwitchCase="'Get Started'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 16 16 12 12 8"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
							<svg *ngSwitchCase="'Coaching Mode'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
							<svg *ngSwitchCase="'Resources'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
						</ng-container>
					</span>
					<span class="action-label">{{ qr.label }}</span>
					<svg class="action-arrow" xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
				</button>
			</div>
		</div>

		<!-- ─── Message Thread ─── -->
		<ng-container *ngFor="let msg of chat.messages(); let i = index; let first = first">
			<div class="msg" [class.msg--user]="msg.sender === 'user'" [class.msg--bot]="msg.sender === 'bot'"
				[hidden]="first && msg.sender === 'bot' && chat.messages().length <= 1">>
				<div *ngIf="msg.sender === 'bot'" class="msg-avatar">
					<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
						stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M12 8V4H8" />
						<rect width="16" height="12" x="4" y="8" rx="2" />
						<path d="M15 13v2" /><path d="M9 13v2" />
					</svg>
				</div>
				<div class="msg-body">
					<div class="msg-bubble">{{ msg.text }}</div>
					<span class="msg-meta">{{ msg.timestamp | date:'shortTime' }}</span>
				</div>
			</div>
		</ng-container>

		<!-- Typing indicator -->
		<div *ngIf="chat.isTyping()" class="msg msg--bot msg--typing">
			<div class="msg-avatar">
				<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M12 8V4H8" />
					<rect width="16" height="12" x="4" y="8" rx="2" />
					<path d="M15 13v2" /><path d="M9 13v2" />
				</svg>
			</div>
			<div class="msg-body">
				<div class="msg-bubble typing-bubble">
					<span class="typing-dot"></span>
					<span class="typing-dot"></span>
					<span class="typing-dot"></span>
				</div>
			</div>
		</div>
	</div>

	<!-- ─── Composer ─── -->
	<div class="chat-composer">
		<div class="composer-box" [class.focused]="isInputFocused">
			<input type="text" [(ngModel)]="userInput" (keydown)="onKeydown($event)"
				(focus)="isInputFocused = true" (blur)="isInputFocused = false"
				placeholder="Type your message..." autocomplete="off" />
			<button class="send-btn" (click)="send()" [disabled]="!userInput.trim()" aria-label="Send">
				<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
					stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="m5 12 7-7 7 7" /><path d="M12 19V5" />
				</svg>
			</button>
		</div>
		<div class="composer-footer">
			<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none"
				stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
				<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
			</svg>
			<span>Powered by <strong>Dev2080</strong></span>
		</div>
	</div>
</div>
